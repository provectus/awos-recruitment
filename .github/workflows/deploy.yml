name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "server/**"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: awos-recruitment-mcp
  ECS_CLUSTER: awos-recruitment
  ECS_SERVICE: awos-recruitment-mcp
  TASK_FAMILY: awos-recruitment-mcp
  CONTAINER_NAME: mcp-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          docker build \
            -t "${IMAGE_URI}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:latest" \
            server
          docker push "${IMAGE_URI}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query taskDefinition \
            > task-definition.json

      - uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
