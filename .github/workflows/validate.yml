name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Validate registry
        run: cd server && uv run python -m awos_recruitment_mcp.validate

      - name: Run tests
        run: cd server && uv run pytest
